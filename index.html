<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio 71 | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">STUDIO 71</div>
        <div class="nav-links">
            <a href="#work">Products</a>
            <a href="#services">Services</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 id="typewriter">SYSTEM.INITIALIZE()</h1>
            <p class="subtitle">Independent development house dedicated to games with a pulse.</p>
        </div>
    </header>

    <section id="work" class="container">
        <h2 class="section-header">In-House Products</h2>
        <div id="project-grid" class="project-grid">
            </div>
    </section>

    <hr class="divider">

    <section id="services" class="container">
        <h2 class="section-header">Operational Services</h2>
        <div id="services-grid" class="services-grid">
            </div>
    </section>

    <section id="contact" class="container">
        <h2 class="section-header">Establish Connection</h2>
        <form class="tactical-form">
            <div class="input-group">
                <label>ID / Alias</label>
                <input type="text" placeholder="Designation">
            </div>
            <div class="input-group">
                <label>Comm-Link</label>
                <input type="email" placeholder="email@domain.com">
            </div>
            <div class="input-group">
                <label>Transmission</label>
                <textarea rows="5" placeholder="Enter data..."></textarea>
            </div>
            <button type="submit" class="button">Send Transmission</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Studio 71. End of line.</p>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
